name: Volume Breakout Scanner

on:
  schedule:
    - cron: '50 3 * * 1-5'   # 9:20 AM IST
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install libs
        run: pip install kiteconnect requests

      - name: Run Screener
        run: python screener.py
