name: Run Screener

on:
  schedule:
    - cron: '50 3 * * 1-5'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install libs
        run: pip install kiteconnect requests

      - name: Run script
        run: python screener.py
